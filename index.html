<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs API Client</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #1e1e2e; color: #cdd6f4; text-align: center;">
    
    <h1 style="color: #89b4fa;">🚀 DecodeLabs API Client</h1>
    <p>Add a new user and retrieve the complete database records!</p>

    <!-- 1. POST Request Form -->
    <div style="background: #313244; max-width: 500px; margin: 20px auto; padding: 25px; border-radius: 10px; border: 1px solid #45475a; text-align: left;">
        <h3 style="margin-top: 0; color: #a6e3a1;">➕ Add New User (POST)</h3>
        
        <label style="display:block; margin: 10px 0 5px;">Full Name:</label>
        <input type="text" id="name" placeholder="E.g., Zain Malik" style="width: 95%; padding: 10px; border-radius: 4px; border: 1px solid #45475a; background: #1e1e2e; color: #fff; margin-bottom: 10px;">

        <label style="display:block; margin: 10px 0 5px;">Email Address:</label>
        <input type="email" id="email" placeholder="E.g., zain@gmail.com" style="width: 95%; padding: 10px; border-radius: 4px; border: 1px solid #45475a; background: #1e1e2e; color: #fff; margin-bottom: 10px;">

        <label style="display:block; margin: 10px 0 5px;">Role:</label>
        <select id="role" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #45475a; background: #1e1e2e; color: #fff; cursor: pointer; margin-bottom: 15px;">
            <option value="member">member</option>
            <option value="admin">admin</option>
        </select>

        <button onclick="addUser()" style="margin-top: 15px; background-color: #a6e3a1; color: #11111b; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 15px;">
            Add User
        </button>
    </div>
    
    <!-- 2. GET Request Button -->
    <button onclick="fetchUsers()" style="background-color: #89b4fa; color: #11111b; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 20px;">
        Get All Users Data
    </button>
    
    <h3 style="margin-top: 20px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto;">Response Output:</h3>
    <pre id="output" style="background: #313244; padding: 20px; border-radius: 8px; text-align: left; max-width: 600px; margin: 0 auto; overflow-x: auto; color: #a6e3a1; border: 1px solid #45475a; font-size: 14px;">
Response data will be displayed here...
    </pre>

    <script>
        // 1. POST Request Function (Add User)
        async function addUser() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, role })
                });

                const data = await response.json();
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);

                // Clear input fields on successful response
                if (response.status === 201) {
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('role').value = 'member';
                }
            } catch (error) {
                document.getElementById('output').innerText = 'Error adding user!';
            }
        }

        // 2. GET Request Function (Fetch Users)
        async function fetchUsers() {
            try {
                const response = await fetch('/users');
                const data = await response.json();
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('output').innerText = 'Error loading users!';
            }
        }
    </script>
</body>
</html>
